<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Night Worship</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0d1117">
    <style>
        :root { --bg: #0d1117; --card: #161b22; --text: #c9d1d9; --accent: #58a6ff; }
        .theme-light { --bg: #fdf6e3; --card: #eee8d5; --text: #586e75; --accent: #b58900; }
        .theme-green { --bg: #062e22; --card: #0b4534; --text: #d0f0c0; --accent: #4ade80; }
        body { background-color: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; transition: 0.3s; }
        #menu-btn { position: absolute; top: 20px; left: 20px; font-size: 2rem; cursor: pointer; }
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 10; padding: 20px; overflow-y: auto; }
        .card { background: var(--card); border-radius: 15px; padding: 20px; margin: 10px; width: 85%; max-width: 350px; }
        .btn { background: var(--accent); color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; margin: 5px; }
    </style>
</head>
<body>
    <div id="menu-btn" onclick="toggleMenu()">🌙</div>
    <h1>Night Worship</h1>
    <h2 id="date-display">...</h2>
    <div class="card"><div id="mid-time">--:--</div><div id="mid-countdown">--:--:--</div></div>
    
    <div id="overlay">
        <button onclick="toggleMenu()">Close</button>
        <h2>Tasbih Counter</h2>
        <h1 id="count" onclick="vibrate()">0</h1>
        <button class="btn" onclick="count++">Increment</button>
        <button onclick="count=0">Reset</button>
        <h2>Themes</h2>
        <button onclick="document.body.className=''">Dark Blue</button>
        <button onclick="document.body.className='theme-light'">Cream</button>
        <button onclick="document.body.className='theme-green'">Dark Green</button>
    </div>

    <script>
        let count = 0;
        function toggleMenu() { document.getElementById('overlay').style.display = document.getElementById('overlay').style.display === 'block' ? 'none' : 'block'; }
        function vibrate() { if (navigator.vibrate) navigator.vibrate(50); document.getElementById('count').innerText = ++count; }
        // ... (Include previous fetchTimes logic here)
    </script>
</body>
</html>
