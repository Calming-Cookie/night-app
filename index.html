<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Night Worship</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0d1117">
    <style>
        :root { /* Default Dark */ --bg: #0d1117; --text: #c9d1d9; --accent: #58a6ff; --card: #161b22; }
        .theme-cream { --bg: #fdf6e3; --text: #586e75; --accent: #268bd2; --card: #eee8d5; }
        .theme-green { --bg: #0e1812; --text: #d8e2dc; --accent: #4e9a6f; --card: #1a2620; }
        
        body { background-color: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; transition: 0.3s; height: 100vh; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow-y: auto;}
        
        /* Menu Overlays */
        #main-view { display: flex; flex-direction: column; align-items: center; width: 100%; }
        #menu-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 100; overflow-y: auto; padding: 20px; box-sizing: border-box;}
        
        .card { background: var(--card); border-radius: 15px; padding: 20px; width: 85%; max-width: 350px; text-align: center; margin: 10px; }
        .btn { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; margin: 5px; }
        .settings-btn { position: fixed; bottom: 20px; right: 20px; opacity: 0.3; font-size: 24px; cursor: pointer; }
        h1 { color: var(--accent); }
    </style>
</head>
<body>

<div id="main-view">
    <h1>Night Worship</h1>
    <h2 id="date-display">Getting Location...</h2>
    <div class="card">
        <div id="mid-time" style="font-size: 2rem;">--:--</div>
        <div style="font-size: 0.9rem; color: var(--accent);">Middle of Night</div>
        <div id="mid-countdown" style="margin-top: 10px; font-weight: bold;">--:--:--</div>
    </div>
    <div class="card">
        <div id="last-third-time" style="font-size: 2rem;">--:--</div>
        <div style="font-size: 0.9rem; color: var(--accent);">Last Third</div>
        <div id="last-third-countdown" style="margin-top: 10px; font-weight: bold;">--:--:--</div>
    </div>
</div>

<div id="menu-overlay">
    <button onclick="toggleMenu()" class="btn" style="background:transparent; border:1px solid var(--text);">Close Menu</button>
    <h2>Settings & Tools</h2>
    <div class="card">
        <h3>Theme</h3>
        <button class="btn" onclick="setTheme('')">Dark</button>
        <button class="btn" onclick="setTheme('theme-cream')">Cream</button>
        <button class="btn" onclick="setTheme('theme-green')">Green</button>
    </div>
    <div class="card">
        <h3>Tasbih Counter</h3>
        <h2 id="count">0</h2>
        <button class="btn" onclick="increment()">Tap</button>
        <button class="btn" onclick="reset()">Reset</button>
    </div>
    <div class="card">
        <h3>Authentic Duas</h3>
        <p><strong>For Anxiety:</strong><br>Ya Hayyu Ya Qayyum, bi-rahmatika astagheeth.<br><small>(O Ever-Living, O Sustainer, in Your Mercy I seek relief)</small></p>
    </div>
</div>

<div class="settings-btn" onclick="toggleMenu()">⚙️</div>

<script>
    function toggleMenu() {
        const m = document.getElementById('menu-overlay');
        m.style.display = (m.style.display === 'block') ? 'none' : 'block';
    }
    
    function setTheme(t) { document.body.className = t; localStorage.setItem('theme', t); }
    document.body.className = localStorage.getItem('theme') || '';

    let count = parseInt(localStorage.getItem('dhikr') || 0);
    document.getElementById('count').innerText = count;
    function increment() { count++; document.getElementById('count').innerText = count; localStorage.setItem('dhikr', count); }
    function reset() { count = 0; document.getElementById('count').innerText = 0; localStorage.setItem('dhikr', 0); }

    async function init() {
        navigator.geolocation.getCurrentPosition(async (pos) => {
            const { latitude, longitude } = pos.coords;
            const now = new Date();
            const d1Str = `${now.getDate()}-${now.getMonth()+1}-${now.getFullYear()}`;
            const url = `https://api.aladhan.com/v1/timings/${d1Str}?latitude=${latitude}&longitude=${longitude}&method=2`;
            const res = await fetch(url).then(r => r.json());
            const maghrib = res.data.timings.Maghrib.split(':');
            const fajr = res.data.timings.Fajr.split(':');
            
            // Logic to bridge night (same as previous)
            document.getElementById('date-display').innerText = "Location locked";
            // [Insert timer logic here to update UI...]
        }, () => { alert("Location required for prayer times."); });
    }
    init();
</script>
</body>
</html>
