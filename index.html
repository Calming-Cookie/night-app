<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Night Worship</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0d1117">
    <style>
        :root { --bg: #0d1117; --text: #c9d1d9; --accent: #58a6ff; --card: #161b22; }
        .theme-cream { --bg: #fdf6e3; --text: #586e75; --accent: #268bd2; --card: #eee8d5; }
        .theme-green { --bg: #0e1812; --text: #d8e2dc; --accent: #4e9a6f; --card: #1a2620; }
        
        body { background-color: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; transition: 0.3s; height: 100vh; margin: 0; display: flex; flex-direction: column; align-items: center; overflow-y: auto;}
        #main-view { display: flex; flex-direction: column; align-items: center; width: 100%; padding-top: 50px; }
        #menu-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 100; overflow-y: auto; padding: 20px; box-sizing: border-box;}
        .card { background: var(--card); border-radius: 15px; padding: 20px; width: 85%; max-width: 350px; text-align: center; margin: 10px; }
        .btn { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; margin: 5px; }
        .settings-btn { position: fixed; bottom: 20px; right: 20px; opacity: 0.3; font-size: 24px; cursor: pointer; }
        input { background: #000; color: #fff; padding: 8px; border-radius: 5px; border: 1px solid #444; width: 90%; margin-bottom: 5px; }
        .scroll-list { height: 200px; overflow-y: auto; text-align: left; font-size: 0.9rem; }
    </style>
</head>
<body>

<div id="main-view">
    <h2 id="date-display">Loading...</h2>
    <div class="card">
        <div id="mid-time" style="font-size: 2rem;">--:--</div>
        <div style="font-size: 0.9rem; color: var(--accent);">Middle of Night</div>
        <div id="mid-countdown" style="margin-top: 10px; font-weight: bold;">--:--:--</div>
    </div>
    <div class="card">
        <div id="last-third-time" style="font-size: 2rem;">--:--</div>
        <div style="font-size: 0.9rem; color: var(--accent);">Last Third</div>
        <div id="last-third-countdown" style="margin-top: 10px; font-weight: bold;">--:--:--</div>
    </div>
</div>

<div id="menu-overlay">
    <button onclick="toggleMenu()" class="btn">Close</button>
    <h3>Settings</h3>
    <div class="card">
        <label>Set Location</label><br>
        <input type="text" id="city" placeholder="City (e.g. Katy)">
        <input type="text" id="state" placeholder="State (e.g. Texas)">
        <input type="text" id="country" placeholder="Country (e.g. US)">
        <button class="btn" onclick="saveLocation()">Save & Update</button>
    </div>
    <div class="card">
        <button class="btn" onclick="setTheme('')">Dark</button>
        <button class="btn" onclick="setTheme('theme-cream')">Cream</button>
        <button class="btn" onclick="setTheme('theme-green')">Green</button>
    </div>
    <div class="card">
        <h3>Tasbih</h3>
        <h2 id="count">0</h2>
        <button class="btn" onclick="increment()">Tap</button>
        <button class="btn" onclick="reset()">Reset</button>
    </div>
    <div class="card">
        <h3>99 Names</h3>
        <div class="scroll-list" id="names-list"></div>
    </div>
</div>

<div class="settings-btn" onclick="toggleMenu()">⚙️</div>

<script>
    // Theme & Storage
    function setTheme(t) { document.body.className = t; localStorage.setItem('theme', t); }
    document.body.className = localStorage.getItem('theme') || '';
    function toggleMenu() { document.getElementById('menu-overlay').style.display = (document.getElementById('menu-overlay').style.display === 'block') ? 'none' : 'block'; }
    
    // Tasbih
    let count = parseInt(localStorage.getItem('dhikr') || 0);
    document.getElementById('count').innerText = count;
    function increment() { count++; document.getElementById('count').innerText = count; localStorage.setItem('dhikr', count); }
    function reset() { count = 0; document.getElementById('count').innerText = 0; localStorage.setItem('dhikr', 0); }

    // Names
    const names = ["Ar-Rahman", "Ar-Rahim", "Al-Malik", "Al-Quddus", "As-Salam", "Al-Mu'min", "Al-Muhaymin", "Al-Aziz", "Al-Jabbar", "Al-Mutakabbir", "Al-Khaliq", "Al-Bari", "Al-Musawwir", "Al-Ghaffar", "Al-Qahhar", "Al-Wahhab", "Ar-Razzaq", "Al-Fattah", "Al-Alim", "Al-Qabid", "Al-Basit", "Al-Khafid", "Ar-Rafi", "Al-Mu'izz", "Al-Mudhill", "As-Sami", "Al-Basir", "Al-Hakam", "Al-Adl", "Al-Latif", "Al-Khabir", "Al-Halim", "Al-Azim", "Al-Ghafur", "Ash-Shakur", "Al-Ali", "Al-Kabir", "Al-Hafiz", "Al-Muqit", "Al-Hasib", "Al-Jalil", "Al-Karim", "Ar-Raqib", "Al-Mujib", "Al-Wasi", "Al-Hakim", "Al-Wadud", "Al-Majid", "Al-Ba'ith", "Ash-Shahid", "Al-Haqq", "Al-Wakil", "Al-Qawiyy", "Al-Matin", "Al-Waliyy", "Al-Hamid", "Al-Muhsi", "Al-Mubdi", "Al-Mu'id", "Al-Muhyi", "Al-Mumit", "Al-Hayy", "Al-Qayyum", "Al-Wajid", "Al-Majid", "Al-Wahid", "As-Samad", "Al-Qadir", "Al-Muqtadir", "Al-Muqaddim", "Al-Mu'akhkhir", "Al-Awwal", "Al-Akhir", "Az-Zahir", "Al-Batin", "Al-Wali", "Al-Muta'ali", "Al-Barr", "At-Tawwab", "Al-Muntaqim", "Al-Afuww", "Ar-Ra'uf", "Malik-ul-Mulk", "Dhu-l-Jalal wal-Ikram", "Al-Muqsit", "Al-Jami", "Al-Ghani", "Al-Mughni", "Al-Mani", "Ad-Darr", "An-Nafi", "An-Nur", "Al-Hadi", "Al-Badi", "Al-Baqi", "Al-Warith", "Ar-Rashid", "As-Sabur"];
    document.getElementById('names-list').innerText = names.join(", ");

    // Location
    function saveLocation() {
        localStorage.setItem('city', document.getElementById('city').value);
        localStorage.setItem('state', document.getElementById('state').value);
        localStorage.setItem('country', document.getElementById('country').value);
        location.reload();
    }

    async function init() {
        const city = localStorage.getItem('city');
        if (!city) { toggleMenu(); document.getElementById('date-display').innerText = "Please set your location"; return; }
        
        document.getElementById('city').value = city;
        document.getElementById('state').value = localStorage.getItem('state');
        document.getElementById('country').value = localStorage.getItem('country');

        const now = new Date();
        // ... (API logic same as before, using saved variables)
    }
    init();
</script>
</body>
</html>
