<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Night Worship</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Night Times">
    <meta name="theme-color" content="#0d1117">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌙</text></svg>">
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        h1 { color: #58a6ff; margin-bottom: 5px; font-weight: 500;}
        h2 { color: #8b949e; font-weight: 400; font-size: 1.1rem; margin-top: 0; margin-bottom: 20px;}
        .card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 15px;
            padding: 30px;
            margin: 15px;
            width: 80%;
            max-width: 350px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
        }
        .time-label { font-size: 1rem; color: #8b949e; margin-bottom: 5px; }
        .time-value { font-size: 2.5rem; font-weight: 600; color: #e6edf3; margin-bottom: 5px; margin-top: 0;}
        .countdown { font-size: 1.2rem; color: #58a6ff; font-weight: bold; margin-bottom: 25px; font-variant-numeric: tabular-nums; }
        .footer { margin-top: 20px; font-size: 0.9rem; color: #8b949e; }
        #update-countdown { color: #58a6ff; font-weight: bold; font-variant-numeric: tabular-nums;}
    </style>
</head>
<body>
    <h1>Night Worship</h1>
    <h2 id="date-display">Loading...</h2>
    
    <div class="card">
        <div class="time-label">🌙 Middle of the Night</div>
        <div class="time-value" id="mid-time">--:--</div>
        <div class="countdown" id="mid-countdown">--:--:--</div>
        
        <div class="time-label">✨ Last Third Begins</div>
        <div class="time-value" id="last-third-time">--:--</div>
        <div class="countdown" id="last-third-countdown" style="margin-bottom: 0;">--:--:--</div>
    </div>
    
    <div class="footer">
        Next app update at 5:00 AM<br>
        Updating in: <span id="update-countdown">--:--:--</span>
    </div>

    <script>
        let midDate, lastThirdDate, nextUpdateDate;

        async function fetchTimes() {
            const city = "Katy", state = "Texas", country = "US";
            const now = new Date();
            
            // To ensure the night calculation works even after midnight, 
            // we logically start the new day calculation at 5:00 AM.
            const baseDate = new Date(now);
            if (baseDate.getHours() < 5) {
                baseDate.setDate(baseDate.getDate() - 1);
            }
            
            const nextDay = new Date(baseDate);
            nextDay.setDate(baseDate.getDate() + 1);
            
            const d1Str = `${baseDate.getDate()}-${baseDate.getMonth() + 1}-${baseDate.getFullYear()}`;
            const d2Str = `${nextDay.getDate()}-${nextDay.getMonth() + 1}-${nextDay.getFullYear()}`;
            
            const url1 = `https://api.aladhan.com/v1/timingsByCity/${d1Str}?city=${city}&state=${state}&country=${country}&method=2`;
            const url2 = `https://api.aladhan.com/v1/timingsByCity/${d2Str}?city=${city}&state=${state}&country=${country}&method=2`;
            
            try {
                const [res1, res2] = await Promise.all([
                    fetch(url1).then(r => r.json()),
                    fetch(url2).then(r => r.json())
                ]);
                
                // Set Maghrib and Fajr Date objects
                const maghribParts = res1.data.timings.Maghrib.split(":");
                const maghribDate = new Date(baseDate);
                maghribDate.setHours(parseInt(maghribParts[0]), parseInt(maghribParts[1]), 0, 0);

                const fajrParts = res2.data.timings.Fajr.split(":");
                const fajrDate = new Date(nextDay);
                fajrDate.setHours(parseInt(fajrParts[0]), parseInt(fajrParts[1]), 0, 0);

                // Calculate durations in milliseconds
                const durationMs = fajrDate.getTime() - maghribDate.getTime();
                midDate = new Date(maghribDate.getTime() + (durationMs / 2));
                lastThirdDate = new Date(maghribDate.getTime() + (durationMs * (2/3)));
                
                // Set the next update target to the upcoming 5:00 AM
                nextUpdateDate = new Date(now);
                if (nextUpdateDate.getHours() >= 5) {
                    nextUpdateDate.setDate(nextUpdateDate.getDate() + 1);
                }
                nextUpdateDate.setHours(5, 0, 0, 0);

                // Display formatting
                function formatTime(d) {
                    let h = d.getHours();
                    let m = d.getMinutes();
                    const ampm = h >= 12 ? "PM" : "AM";
                    h = h % 12 || 12;
                    return `${h}:${m < 10 ? '0'+m : m} ${ampm}`;
                }
                
                document.getElementById('mid-time').innerText = formatTime(midDate);
                document.getElementById('last-third-time').innerText = formatTime(lastThirdDate);
                
                // Set the display date (Gregorian and Hijri)
                const hijri = res1.data.date.hijri;
                const greg = res1.data.date.gregorian;
                document.getElementById('date-display').innerText = `${greg.weekday.en}, ${greg.month.en} ${greg.day} | ${hijri.day} ${hijri.month.en} ${hijri.year}`;
                
                // Start the live countdowns
                setInterval(updateCountdowns, 1000);
                updateCountdowns();
                
            } catch (error) {
                document.getElementById('date-display').innerText = "Error loading times. Check internet.";
            }
        }

        function updateCountdowns() {
            const now = new Date().getTime();

            function getDiff(targetTime) {
                const diff = targetTime.getTime() - now;
                if (diff <= 0) return "Time has passed";
                
                const h = Math.floor(diff / (1000 * 60 * 60));
                const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const s = Math.floor((diff % (1000 * 60)) / 1000);
                
                // Format with leading zeros for neatness
                const mStr = m < 10 ? "0" + m : m;
                const sStr = s < 10 ? "0" + s : s;
                return `${h}h ${mStr}m ${sStr}s`;
            }

            if (midDate) document.getElementById('mid-countdown').innerText = getDiff(midDate);
            if (lastThirdDate) document.getElementById('last-third-countdown').innerText = getDiff(lastThirdDate);
            
            if (nextUpdateDate) {
                const updateDiff = nextUpdateDate.getTime() - now;
                if (updateDiff <= 0) {
                    // Force the app to automatically refresh and fetch new times at exactly 5:00 AM
                    window.location.reload();
