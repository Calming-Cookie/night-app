<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Night Worship</title>
    <style>
        /* Theme Definitions */
        :root { --bg: #0d1117; --card: #161b22; --text: #c9d1d9; --accent: #58a6ff; }
        .theme-cream { --bg: #fdf6e3; --card: #eee8d5; --text: #586e75; --accent: #b58900; }
        .theme-dark-green { --bg: #0b1a0e; --card: #15301c; --text: #d4e6d4; --accent: #4ade80; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: sans-serif;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; margin: 0; text-align: center; transition: 0.3s;
        }
        
        .main-view, .dua-view { width: 100%; display: flex; flex-direction: column; align-items: center; }
        .hidden { display: none; }

        .card { background: var(--card); border-radius: 15px; padding: 20px; margin: 15px; width: 80%; max-width: 350px; }
        h1 { color: var(--accent); margin: 20px 0 5px; }
        
        /* Button & UI */
        .btn { padding: 5px 15px; border-radius: 20px; border: 1px solid var(--accent); color: var(--accent); background: none; cursor: pointer; margin: 10px; font-size: 0.8rem; }
        .dua-item { text-align: left; margin-bottom: 20px; border-bottom: 1px solid var(--accent); padding-bottom: 10px; width: 90%; }
        .arabic { font-size: 1.5rem; text-align: right; margin-bottom: 5px; }
        .translit { font-style: italic; font-size: 0.9rem; margin-bottom: 5px; }
        .trans { font-size: 0.9rem; opacity: 0.8; }
    </style>
</head>
<body>

<div id="main-view" class="main-view">
    <h1>Night Worship</h1>
    <div>
        <button class="btn" onclick="setTheme('')">Dark</button>
        <button class="btn" onclick="setTheme('theme-cream')">Cream</button>
        <button class="btn" onclick="setTheme('theme-dark-green')">Green</button>
    </div>
    
    <div class="card">
        <div id="mid-time">--:--</div>
        <div id="mid-countdown">--:--:--</div>
    </div>
    
    <button class="btn" onclick="toggleView()">Duas for Night</button>
</div>

<div id="dua-view" class="dua-view hidden">
    <h2>Night Duas</h2>
    <button class="btn" onclick="toggleView()">Back</button>
    <div class="dua-item">
        <div class="arabic">اللَّهُمَّ اجْعَلْ فِي قَلْبِي نُورًا...</div>
        <div class="translit">Allahummaj'al fi qalbi nura...</div>
        <div class="trans">O Allah, place light in my heart...</div>
    </div>
</div>

<script>
    function setTheme(theme) { document.body.className = theme; }
    function toggleView() {
        document.getElementById('main-view').classList.toggle('hidden');
        document.getElementById('dua-view').classList.toggle('hidden');
    }
    // Keep your existing timer logic here...
</script>
</body>
</html>
