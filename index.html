<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Night Worship</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Night Times">
    <meta name="theme-color" content="#0d1117">
    <style>
        :root {
            --bg: #0d1117;
            --card-bg: #161b22;
            --border: #30363d;
            --text: #c9d1d9;
            --text-bright: #e6edf3;
            --text-muted: #8b949e;
            --accent: #58a6ff;
            --accent-glow: rgba(88,166,255,0.55);
            --shadow: rgba(0,0,0,0.2);
            --btn-fg: #0d1117;
            --particle: rgba(88,166,255,0.12);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body {
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0;
            text-align: center;
            touch-action: none;
        }
        #particles {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }
        h1 {
            color: var(--accent);
            margin-bottom: 5px;
            font-weight: 500;
            cursor: pointer;
            user-select: none;
            position: relative;
            z-index: 1;
            transition: text-shadow 0.15s ease;
        }
        h1.glow { text-shadow: 0 0 14px var(--accent-glow), 0 0 40px var(--accent-glow); }
        h2 {
            color: var(--text-muted);
            font-weight: 400;
            font-size: 1.1rem;
            margin-top: 0;
            margin-bottom: 20px;
            cursor: pointer;
            user-select: none;
            transition: opacity 0.25s ease, transform 0.25s ease;
            position: relative;
            z-index: 1;
        }
        h2.out { opacity: 0; transform: translateY(-5px); }
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 30px;
            margin: 15px;
            width: 80%;
            max-width: 350px;
            box-shadow: 0 8px 24px var(--shadow);
            transition: box-shadow 0.5s ease, border-color 0.5s ease;
            position: relative;
            z-index: 1;
            cursor: pointer;
            user-select: none;
        }
        .card.glow {
            box-shadow: 0 8px 24px var(--shadow), 0 0 0 2px var(--accent), 0 0 28px var(--accent-glow);
            border-color: var(--accent);
        }
        .time-label {
            font-size: 1rem;
            color: var(--text-muted);
            margin-bottom: 5px;
            cursor: pointer;
            user-select: none;
            display: inline-block;
        }
        .time-label.glow { text-shadow: 0 0 10px var(--accent-glow); }
        .time-label.pop { animation: pop 0.32s cubic-bezier(.34,1.56,.64,1); }
        @keyframes pop {
            0%   { transform: scale(1) rotate(0deg); }
            30%  { transform: scale(1.14) rotate(-3deg); }
            60%  { transform: scale(1.06) rotate(1deg); }
            100% { transform: scale(1) rotate(0deg); }
        }
        .time-value {
            font-size: 2.5rem;
            font-weight: 600;
            color: var(--text-bright);
            margin-bottom: 5px;
            margin-top: 0;
            cursor: pointer;
            user-select: none;
            transition: opacity 0.2s ease, transform 0.2s ease;
        }
        .time-value.flip {
            opacity: 0.1;
            transform: translateY(-6px) scale(0.97);
        }
        .countdown {
            font-size: 1.2rem;
            color: var(--accent);
            font-weight: bold;
            font-variant-numeric: tabular-nums;
            cursor: pointer;
            user-select: none;
            display: inline-block;
            transition: text-shadow 0.2s ease;
        }
        .countdown.glow { text-shadow: 0 0 16px var(--accent-glow), 0 0 32px var(--accent-glow); }
        .card-divider {
            height: 1px;
            background: var(--border);
            margin: 22px 0 24px 0;
            opacity: 0.5;
        }
        .footer {
            margin-top: 20px;
            font-size: 0.9rem;
            color: var(--text-muted);
            cursor: pointer;
            user-select: none;
            position: relative;
            z-index: 1;
            min-height: 2.8em;
        }
        .fp {
            transition: opacity 0.25s ease, transform 0.25s ease;
        }
        .fp.off {
            opacity: 0;
            position: absolute;
            pointer-events: none;
            left: 50%;
            transform: translateX(-50%) translateY(8px);
            white-space: nowrap;
        }
        .fp.on {
            opacity: 1;
            position: relative;
            transform: translateX(0) translateY(0);
        }
        #update-countdown {
            color: var(--accent);
            font-weight: bold;
            font-variant-numeric: tabular-nums;
        }
        .sparkle {
            position: fixed;
            pointer-events: none;
            opacity: 0;
            z-index: 0;
            will-change: transform, opacity;
        }
        .sparkle.trail {
            border-radius: 50%;
            animation: trailUp 1.6s ease-out forwards;
        }
        .sparkle.tap {
            font-size: 11px;
            animation: drift 2.6s ease-out forwards;
        }
        @keyframes trailUp {
            0%   { opacity: 0.7; transform: translateY(0) translateX(0) scale(1); }
            100% { opacity: 0; transform: translateY(-55px) translateX(var(--dx, 0px)) scale(0.05); }
        }
        @keyframes drift {
            0%   { opacity: 0; transform: translateY(0) scale(0.2); }
            10%  { opacity: 0.7; transform: translateY(-5px) scale(1.1); }
            100% { opacity: 0; transform: translateY(-80px) translateX(var(--dx, 0px)) scale(0.08); }
        }
        #tbtn {
            position: fixed;
            bottom: 14px;
            right: 14px;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--accent);
            border: 2px solid var(--border);
            cursor: pointer;
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.3;
            transition: opacity 0.3s ease, transform 0.2s ease;
        }
        #tbtn:hover, #tbtn:active { opacity: 1; transform: scale(1.15); }
        #tbtn span { font-size: 11px; color: var(--btn-fg); line-height: 1; pointer-events: none; }
        #tpanel {
            position: fixed;
            bottom: 48px;
            right: 8px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 8px 10px;
            z-index: 200;
            display: none;
            flex-direction: row;
            gap: 9px;
            box-shadow: 0 6px 24px var(--shadow);
            transform-origin: bottom right;
        }
        #tpanel.open { display: flex; animation: panelIn 0.2s ease-out; }
        @keyframes panelIn {
            from { opacity: 0; transform: scale(0.85) translateY(6px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }
        .tdot {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            cursor: pointer;
            border: 2.5px solid transparent;
            transition: transform 0.18s cubic-bezier(.34,1.56,.64,1), border-color 0.2s ease;
            flex-shrink: 0;
        }
        .tdot:hover, .tdot:active { transform: scale(1.25); }
        .tdot.active { border-color: var(--text-bright); transform: scale(1.1); }
    </style>
</head>
<body>

    <canvas id="particles"></canvas>

    <h1 id="title">Night Worship</h1>
    <h2 id="date-display">Loading...</h2>

    <div class="card" id="card">
        <div class="time-label" id="mid-label">🌙 Middle of the Night</div>
        <div class="time-value" id="mid-time">--:--</div>
        <div class="countdown" id="mid-countdown">--:--:--</div>

        <div class="card-divider"></div>

        <div class="time-label" id="lt-label">✨ Last Third Begins</div>
        <div class="time-value" id="last-third-time">--:--</div>
        <div class="countdown" id="last-third-countdown" style="margin-bottom: 0;">--:--:--</div>
    </div>

    <div class="footer" id="footer">
        <div class="fp on" id="f-up">Next app update at 5:00 AM<br>Updating in: <span id="update-countdown">--:--:--</span></div>
        <div class="fp off" id="f-loc">Times for Katy, Texas<br>Calculation method: ISNA</div>
    </div>

    <div id="tbtn"><span>◐</span></div>
    <div id="tpanel">
        <div class="tdot" data-t="black" style="background:#1a1a1a;border-color:#333"></div>
        <div class="tdot active" data-t="midnight" style="background:#58a6ff"></div>
        <div class="tdot" data-t="cream" style="background:#c49a2a"></div>
        <div class="tdot" data-t="forest" style="background:#4ade80"></div>
        <div class="tdot" data-t="dusk" style="background:#a78bfa"></div>
        <div class="tdot" data-t="ember" style="background:#f59e42"></div>
    </div>

    <script>
        /* ═══════════ Ambient particles ═══════════ */
        var cvs = document.getElementById('particles');
        var ctx = cvs.getContext('2d');
        var pColor = { r: 88, g: 166, b: 255 };
        var pTarget = { r: 88, g: 166, b: 255 };
        var dots = [];
        var DOT_COUNT = 32;

        function sizeCanvas() {
            cvs.width = window.innerWidth;
            cvs.height = window.innerHeight;
        }
        sizeCanvas();
        window.addEventListener('resize', sizeCanvas);

        function makeDot() {
            return {
                x: Math.random() * cvs.width,
                y: Math.random() * cvs.height,
                r: 1 + Math.random() * 2.2,
                vy: -(0.08 + Math.random() * 0.18),
                vx: (Math.random() - 0.5) * 0.12,
                phase: Math.random() * Math.PI * 2,
                speed: 0.003 + Math.random() * 0.006,
                baseAlpha: 0.08 + Math.random() * 0.18
            };
        }
        for (var i = 0; i < DOT_COUNT; i++) dots.push(makeDot());

        function lerpColor() {
            pColor.r += (pTarget.r - pColor.r) * 0.02;
            pColor.g += (pTarget.g - pColor.g) * 0.02;
            pColor.b += (pTarget.b - pColor.b) * 0.02;
        }

        function drawParticles() {
            ctx.clearRect(0, 0, cvs.width, cvs.height);
            lerpColor();
            var cr = Math.round(pColor.r), cg = Math.round(pColor.g), cb = Math.round(pColor.b);
            for (var i = 0; i < dots.length; i++) {
                var d = dots[i];
                d.phase += d.speed;
                d.x += d.vx + Math.sin(d.phase) * 0.15;
                d.y += d.vy;
                if (d.y < -10) { d.y = cvs.height + 10; d.x = Math.random() * cvs.width; }
                if (d.x < -10) d.x = cvs.width + 10;
                if (d.x > cvs.width + 10) d.x = -10;
                var a = d.baseAlpha * (0.5 + 0.5 * Math.sin(d.phase * 1.3));
                ctx.beginPath();
                ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(' + cr + ',' + cg + ',' + cb + ',' + a.toFixed(3) + ')';
                ctx.fill();
            }
            requestAnimationFrame(drawParticles);
        }
        drawParticles();

        function setParticleColor(r, g, b) { pTarget = { r: r, g: g, b: b }; }

        /* ═══════════ Generate app icon ═══════════ */
        function drawStar(ctx, cx, cy, spikes, oR, iR) {
            var rot = -Math.PI / 2, step = Math.PI / spikes;
            ctx.beginPath();
            for (var i = 0; i < spikes; i++) {
                ctx.lineTo(cx + Math.cos(rot) * oR, cy + Math.sin(rot) * oR); rot += step;
                ctx.lineTo(cx + Math.cos(rot) * iR, cy + Math.sin(rot) * iR); rot += step;
            }
            ctx.closePath(); ctx.fill();
        }
        function generateIcon() {
            var s = 180, c = document.createElement('canvas');
            c.width = s; c.height = s;
            var x = c.getContext('2d');
            var r = 38;
            x.beginPath();
            x.moveTo(r, 0); x.lineTo(s - r, 0);
            x.quadraticCurveTo(s, 0, s, r); x.lineTo(s, s - r);
            x.quadraticCurveTo(s, s, s - r, s); x.lineTo(r, s);
            x.quadraticCurveTo(0, s, 0, s - r); x.lineTo(0, r);
            x.quadraticCurveTo(0, 0, r, 0);
            x.closePath();
            x.fillStyle = '#0d1117'; x.fill();
            x.strokeStyle = '#21262d'; x.lineWidth = 2; x.stroke();
            x.fillStyle = '#58a6ff';
            x.beginPath(); x.arc(76, 78, 34, 0, Math.PI * 2); x.fill();
            x.fillStyle = '#0d1117';
            x.beginPath(); x.arc(94, 70, 28, 0, Math.PI * 2); x.fill();
            x.fillStyle = '#58a6ff';
            drawStar(x, 124, 50, 4, 7, 3);
            drawStar(x, 108, 108, 4, 5.5, 2.3);
            drawStar(x, 140, 78, 4, 4.5, 1.8);
            x.fillStyle = 'rgba(88,166,255,0.5)';
            drawStar(x, 55, 118, 4, 3.5, 1.4);
            drawStar(x, 130, 118, 4, 3, 1.2);
            x.font = '600 22px -apple-system, BlinkMacSystemFont, sans-serif';
            x.fillStyle = '#8b949e';
            x.textAlign = 'center'; x.textBaseline = 'middle';
            x.fillText('NW', 90, 152);
            var url = c.toDataURL('image/png');
            var a = document.createElement('link'); a.rel = 'apple-touch-icon'; a.href = url; document.head.appendChild(a);
            var f = document.createElement('link'); f.rel = 'icon'; f.type = 'image/png'; f.href = url; document.head.appendChild(f);
        }
        generateIcon();

        /* ═══════════ Themes ═══════════ */
        var themes = {
            black: {
                '--bg':'#000000','--card-bg':'#0a0a0a','--border':'#1a1a1a',
                '--text':'#888888','--text-bright':'#c8c8c8','--text-muted':'#4a4a4a',
                '--accent':'#6688aa','--accent-glow':'rgba(102,136,170,0.35)',
                '--shadow':'rgba(0,0,0,0.5)','--btn-fg':'#000000',
                pc: [102, 136, 170]
            },
            midnight: {
                '--bg':'#0d1117','--card-bg':'#161b22','--border':'#30363d',
                '--text':'#c9d1d9','--text-bright':'#e6edf3','--text-muted':'#8b949e',
                '--accent':'#58a6ff','--accent-glow':'rgba(88,166,255,0.55)',
                '--shadow':'rgba(0,0,0,0.2)','--btn-fg':'#0d1117',
                pc: [88, 166, 255]
            },
            cream: {
                '--bg':'#f3ede2','--card-bg':'#e9e2d3','--border':'#d0c5b0',
                '--text':'#4a4035','--text-bright':'#2a2218','--text-muted':'#8a7d6c',
                '--accent':'#a67c00','--accent-glow':'rgba(166,124,0,0.35)',
                '--shadow':'rgba(60,45,20,0.09)','--btn-fg':'#fff',
                pc: [166, 124, 0]
            },
            forest: {
                '--bg':'#0b1810','--card-bg':'#12201a','--border':'#244030',
                '--text':'#b5cbbd','--text-bright':'#d6e9dc','--text-muted':'#688a72',
                '--accent':'#4ade80','--accent-glow':'rgba(74,222,128,0.4)',
                '--shadow':'rgba(0,0,0,0.3)','--btn-fg':'#0b1810',
                pc: [74, 222, 128]
            },
            dusk: {
                '--bg':'#15122a','--card-bg':'#1d1938','--border':'#332c5a',
                '--text':'#c2bbde','--text-bright':'#ddd8f0','--text-muted':'#787098',
                '--accent':'#a78bfa','--accent-glow':'rgba(167,139,250,0.4)',
                '--shadow':'rgba(0,0,0,0.3)','--btn-fg':'#15122a',
                pc: [167, 139, 250]
            },
            ember: {
                '--bg':'#1a0f0b','--card-bg':'#261913','--border':'#3d281c',
                '--text':'#d3bbae','--text-bright':'#e9d6cc','--text-muted':'#896e5e',
                '--accent':'#f59e42','--accent-glow':'rgba(245,158,66,0.4)',
                '--shadow':'rgba(0,0,0,0.3)','--btn-fg':'#1a0f0b',
                pc: [245, 158, 66]
            }
        };

        function setTheme(name) {
            var v = themes[name]; if (!v) return;
            var r = document.documentElement;
            for (var k in v) {
                if (k === 'pc') continue;
                r.style.setProperty(k, v[k]);
            }
            document.querySelector('meta[name="theme-color"]').content = v['--bg'];
            setParticleColor(v.pc[0], v.pc[1], v.pc[2]);
            document.querySelectorAll('.tdot').forEach(function(d) {
                d.classList.toggle('active', d.dataset.t === name);
            });
            try { localStorage.setItem('nw-theme', name); } catch(e) {}
        }

        (function() {
            try { var s = localStorage.getItem('nw-theme'); if (s && themes[s]) setTheme(s); } catch(e) {}
        })();

        var tbtn = document.getElementById('tbtn');
        var tpanel = document.getElementById('tpanel');
        tbtn.addEventListener('click', function(e) { e.stopPropagation(); tpanel.classList.toggle('open'); });
        tbtn.addEventListener('touchend', function(e) { e.stopPropagation(); });
        document.querySelectorAll('.tdot').forEach(function(d) {
            d.addEventListener('click', function(e) {
                e.stopPropagation(); setTheme(this.dataset.t);
                setTimeout(function() { tpanel.classList.remove('open'); }, 120);
            });
        });
        document.addEventListener('click', function(e) {
            if (!tpanel.contains(e.target) && !tbtn.contains(e.target)) tpanel.classList.remove('open');
        });
        document.addEventListener('touchstart', function(e) {
            if (!tpanel.contains(e.target) && !tbtn.contains(e.target)) tpanel.classList.remove('open');
        }, { passive: true });

        /* ═══════════ State ═══════════ */
        var midDate, lastThirdDate, nextUpdateDate;
        var use24 = false, dateMode = 0, footerPane = 0;
        var fullDateStr = '';
        var moons = ['🌙','🌓','🌔','🌕','🌖','🌘'];
        var mi = 0;
        var starGlyphs = ['✨','⭐','🌟','💫'];
        var si = 0;

        /* ═══════════ Sparkle helpers ═══════════ */
        function accentColor() {
            return getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();
        }
        function spawnTrailDot(x, y) {
            var el = document.createElement('div');
            el.className = 'sparkle trail';
            var size = 4 + Math.random() * 7;
            el.style.width = size + 'px'; el.style.height = size + 'px';
            el.style.left = (x - size / 2 + (Math.random() - 0.5) * 16) + 'px';
            el.style.top  = (y - size / 2 + (Math.random() - 0.5) * 16) + 'px';
            el.style.background = accentColor();
            el.style.boxShadow = '0 0 ' + (4 + Math.random() * 6) + 'px ' + accentColor();
            el.style.setProperty('--dx', ((Math.random() - 0.5) * 36) + 'px');
            document.body.appendChild(el);
            setTimeout(function() { el.remove(); }, 1700);
        }
        function spawnTrailBurst(x, y) {
            var count = 4 + Math.floor(Math.random() * 3);
            for (var i = 0; i < count; i++) {
                (function(d) { setTimeout(function() { spawnTrailDot(x, y); }, d); })(i * 25);
            }
        }
        function spawnTapCluster(x, y) {
            var glyphs = ['·','✦','⋆','✧','·','✦'];
            for (var i = 0; i < 5; i++) {
                (function(delay) {
                    setTimeout(function() {
                        var el = document.createElement('div');
                        el.className = 'sparkle tap';
                        el.textContent = glyphs[Math.floor(Math.random() * glyphs.length)];
                        el.style.left = (x + (Math.random() - 0.5) * 48 - 5) + 'px';
                        el.style.top  = (y + (Math.random() - 0.5) * 36 - 5) + 'px';
                        el.style.color = accentColor();
                        el.style.setProperty('--dx', ((Math.random() - 0.5) * 32) + 'px');
                        document.body.appendChild(el);
                        setTimeout(function() { el.remove(); }, 2700);
                    }, delay);
                })(i * 40);
            }
        }

        /* ═══════════ Touch trail ═══════════ */
        var lastTrailTime = 0, isTrailing = false;
        document.body.addEventListener('touchstart', function(e) {
            if (e.target !== document.body) return;
            isTrailing = true;
            spawnTapCluster(e.touches[0].clientX, e.touches[0].clientY);
        }, { passive: true });
        document.body.addEventListener('touchmove', function(e) {
            e.preventDefault();
            if (!isTrailing) return;
            var now = Date.now();
            if (now - lastTrailTime < 25) return;
            lastTrailTime = now;
            spawnTrailBurst(e.touches[0].clientX, e.touches[0].clientY);
        }, { passive: false });
        document.body.addEventListener('touchend', function() { isTrailing = false; }, { passive: true });

        var mouseDown = false, lastMouseTrail = 0;
        document.body.addEventListener('mousedown', function(e) {
            if (e.target !== document.body) return;
            mouseDown = true;
            spawnTapCluster(e.clientX, e.clientY);
        });
        document.body.addEventListener('mousemove', function(e) {
            if (!mouseDown) return;
            var now = Date.now();
            if (now - lastMouseTrail < 25) return;
            lastMouseTrail = now;
            spawnTrailBurst(e.clientX, e.clientY);
        });
        document.body.addEventListener('mouseup', function() { mouseDown = false; });

        /* ═══ 2. Title: tap → glow ═══ */
        var titleEl = document.getElementById('title');
        titleEl.addEventListener('click', function() {
            this.classList.add('glow');
            var self = this;
            setTimeout(function() { self.classList.remove('glow'); }, 700);
        });

        /* ═══ 3. Date: tap → cycle ═══ */
        var dateEl = document.getElementById('date-display');
        dateEl.addEventListener('click', function() {
            dateMode = (dateMode + 1) % 3;
            this.classList.add('out');
            var self = this;
            setTimeout(function() {
                var p = fullDateStr.split(' | ');
                if (dateMode === 1)      self.innerText = p[0] || fullDateStr;
                else if (dateMode === 2) self.innerText = p[1] || fullDateStr;
                else                     self.innerText = fullDateStr;
                self.classList.remove('out');
            }, 260);
        });

        /* ═══ 4. Card: tap → glow ═══ */
        var card = document.getElementById('card');
        card.addEventListener('click', function() {
            this.classList.add('glow');
            var self = this;
            setTimeout(function() { self.classList.remove('glow'); }, 900);
        });

        /* ═══ 5. Moon label: tap → cycle + pop ═══ */
        var midLabel = document.getElementById('mid-label');
        midLabel.addEventListener('click', function() {
            mi = (mi + 1) % moons.length;
            this.textContent = moons[mi] + ' Middle of the Night';
            this.classList.remove('pop'); void this.offsetWidth; this.classList.add('pop');
        });

        /* ═══ 6. Star label: tap → glow ═══ */
        var ltLabel = document.getElementById('lt-label');
        ltLabel.addEventListener('click', function() {
            si = (si + 1) % starGlyphs.length;
            this.textContent = starGlyphs[si] + ' Last Third Begins';
            this.classList.add('glow');
            var self = this;
            setTimeout(function() { self.classList.remove('glow'); }, 600);
        });

        /* ═══ 7. Time values: tap → toggle 12h/24h ═══ */
        function fmt(d, h24) {
            if (h24) return (d.getHours() < 10 ? '0' : '') + d.getHours() + ':' + (d.getMinutes() < 10 ? '0' : '') + d.getMinutes();
            var h = d.getHours(), m = d.getMinutes(), ap = h >= 12 ? 'PM' : 'AM';
            h = h % 12 || 12;
            return h + ':' + (m < 10 ? '0' : '') + m + ' ' + ap;
        }
        function paintTimes() {
            if (midDate)       document.getElementById('mid-time').innerText = fmt(midDate, use24);
            if (lastThirdDate) document.getElementById('last-third-time').innerText = fmt(lastThirdDate, use24);
        }
        function flipFormat() {
            use24 = !use24;
            var a = document.getElementById('mid-time'), b = document.getElementById('last-third-time');
            a.classList.add('flip'); b.classList.add('flip');
            setTimeout(function() { paintTimes(); a.classList.remove('flip'); b.classList.remove('flip'); }, 240);
        }
        document.getElementById('mid-time').addEventListener('click', flipFormat);
        document.getElementById('last-third-time').addEventListener('click', flipFormat);

        /* ═══ 8. Countdowns: tap → glow ═══ */
        document.querySelectorAll('.countdown').forEach(function(el) {
            el.addEventListener('click', function() {
                this.classList.add('glow');
                var self = this;
                setTimeout(function() { self.classList.remove('glow'); }, 550);
            });
        });

        /* ═══ 9. Footer: tap → toggle ═══ */
        document.getElementById('footer').addEventListener('click', function() {
            footerPane = 1 - footerPane;
            var a = document.getElementById('f-up'), b = document.getElementById('f-loc');
            a.className = 'fp ' + (footerPane === 0 ? 'on' : 'off');
            b.className = 'fp ' + (footerPane === 1 ? 'on' : 'off');
        });

        /* ════════════════ App logic ════════════════ */
        async function fetchTimes() {
            var city = "Katy", state = "Texas", country = "US";
            var now = new Date();
            var baseDate = new Date(now);
            if (baseDate.getHours() < 5) baseDate.setDate(baseDate.getDate() - 1);
            var nextDay = new Date(baseDate);
            nextDay.setDate(baseDate.getDate() + 1);
            var d1Str = baseDate.getDate() + '-' + (baseDate.getMonth() + 1) + '-' + baseDate.getFullYear();
            var d2Str = nextDay.getDate() + '-' + (nextDay.getMonth() + 1) + '-' + nextDay.getFullYear();
            var url1 = 'https://api.aladhan.com/v1/timingsByCity/' + d1Str + '?city=' + city + '&state=' + state + '&country=' + country + '&method=2';
            var url2 = 'https://api.aladhan.com/v1/timingsByCity/' + d2Str + '?city=' + city + '&state=' + state + '&country=' + country + '&method=2';
            try {
                var res = await Promise.all([
                    fetch(url1).then(function(r) { return r.json(); }),
                    fetch(url2).then(function(r) { return r.json(); })
                ]);
                var mp = res[0].data.timings.Maghrib.split(":");
                var maghribDate = new Date(baseDate);
                maghribDate.setHours(parseInt(mp[0]), parseInt(mp[1]), 0, 0);
                var fp = res[1].data.timings.Fajr.split(":");
                var fajrDate = new Date(nextDay);
                fajrDate.setHours(parseInt(fp[0]), parseInt(fp[1]), 0, 0);
                var dur = fajrDate.getTime() - maghribDate.getTime();
                midDate = new Date(maghribDate.getTime() + dur / 2);
                lastThirdDate = new Date(maghribDate.getTime() + dur * (2 / 3));
                nextUpdateDate = new Date(now);
                if (nextUpdateDate.getHours() >= 5) nextUpdateDate.setDate(nextUpdateDate.getDate() + 1);
                nextUpdateDate.setHours(5, 0, 0, 0);
                document.getElementById('mid-time').innerText = fmt(midDate, false);
                document.getElementById('last-third-time').innerText = fmt(lastThirdDate, false);
                var g1 = res[0].data.date.gregorian;
                var g2 = res[1].data.date.gregorian;
                var hj = res[0].data.date.hijri;
                var ds = g1.month.en + ' ' + g1.day + '/' + g2.day;
                if (g1.month.en !== g2.month.en) ds = g1.month.en + ' ' + g1.day + ' / ' + g2.month.en + ' ' + g2.day;
                fullDateStr = g1.weekday.en + ', ' + ds + ' | ' + hj.day + ' ' + hj.month.en + ' ' + hj.year;
                document.getElementById('date-display').innerText = fullDateStr;
                setInterval(updateCountdowns, 1000);
                updateCountdowns();
            } catch (error) {
                document.getElementById('date-display').innerText = "Error loading times. Check internet.";
            }
        }

        function updateCountdowns() {
            var now = new Date().getTime();
            function diff(t) {
                var d = t.getTime() - now;
                if (d <= 0) return "Time has passed";
                var h = Math.floor(d / 3600000);
                var m = Math.floor((d % 3600000) / 60000);
                var s = Math.floor((d % 60000) / 1000);
                return h + 'h ' + (m < 10 ? '0' : '') + m + 'm ' + (s < 10 ? '0' : '') + s + 's';
            }
            if (midDate)       document.getElementById('mid-countdown').innerText = diff(midDate);
            if (lastThirdDate) document.getElementById('last-third-countdown').innerText = diff(lastThirdDate);
            if (nextUpdateDate) {
                var ud = nextUpdateDate.getTime() - now;
                if (ud <= 0) { window.location.reload(); return; }
                var h = Math.floor(ud / 3600000);
                var m = Math.floor((ud % 3600000) / 60000);
                var s = Math.floor((ud % 60000) / 1000);
                var el = document.getElementById('update-countdown');
                if (el) el.innerText = h + 'h ' + (m < 10 ? '0' : '') + m + 'm ' + (s < 10 ? '0' : '') + s + 's';
            }
        }

        fetchTimes();
    </script>
</body>
</html>
